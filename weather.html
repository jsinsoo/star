<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전국 날씨(전북과학고)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f4f8; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 420px; text-align: center; }
        
        /* 시계 및 날짜 */
        #clock { font-size: 2.8rem; font-weight: bold; color: #2c3e50; margin-bottom: 5px; letter-spacing: -1px; }
        #date { font-size: 1rem; color: #7f8c8d; margin-bottom: 25px; }
        
        /* 지역 선택기 */
        .selector-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 15px; }
        .select-group { display: flex; gap: 8px; }
        select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 0.9rem; outline: none; background: white; }
        .btn-weather { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #3498db; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-weather:hover { background: #2980b9; }

        /* 날씨 정보 출력창 */
        .weather-info { text-align: left; background: #ffffff; padding: 20px; border-radius: 15px; border: 1px solid #edf2f7; position: relative; min-height: 160px; margin-bottom: 20px; }
        .temp-main { font-size: 2.5rem; font-weight: bold; color: #2c3e50; text-align: center; margin: 10px 0; }
        .recommend { color: #d35400; font-weight: bold; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #eee; text-align: center; font-size: 1.1rem; }
        
        /* 🎵 음악 플레이어 섹션 */
        .music-player { background: #f1f3f5; padding: 15px; border-radius: 15px; text-align: center; }
        .music-title { font-size: 0.9rem; color: #555; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
        .file-label { display: inline-block; background: #2ecc71; color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .file-label:hover { background: #27ae60; }
        #music-file { display: none; }
        audio { width: 100%; height: 35px; outline: none; }

        .update-tag { font-size: 0.75rem; color: #bdc3c7; margin-top: 15px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <div id="clock">00:00:00</div>
    <div id="date">로딩 중...</div>

    <div class="selector-container">
        <div class="select-group">
            <select id="main-region" onchange="updateSubRegion()">
                <option value="">시/도 선택</option>
            </select>
            <select id="sub-region">
                <option value="">시/군/구 선택</option>
            </select>
        </div>
        <button class="btn-weather" onclick="fetchWeather()">날씨 확인하기</button>
    </div>

    <div class="weather-info" id="weather-content">
        <div style="text-align:center; padding-top:50px; color:#95a5a6;">지역을 선택해 주세요.</div>
    </div>

    <div class="music-player">
        <div class="music-title" id="song-name">곡을 선택해주세요 🎧</div>
        <label for="music-file" class="file-label">MP3 선택하기</label>
        <input type="file" id="music-file" accept="audio/mp3">
        <audio id="audio-player" controls></audio>
    </div>
    
    <span class="update-tag" id="last-update">최근 업데이트: -</span>
</div>

<script>
    // [기존의 regionData 및 공공데이터 키는 동일하게 유지]
    const serviceKey = "eb995e1b419400d31480385c6b40c859b8ade3502da6cf3823d9b84f1d69c8a6";
    const regionData = {
        "서울특별시": { "종로구": [60,127], "중구": [60,127], "용산구": [60,126], "성동구": [61,127], "광진구": [62,126], "동대문구": [61,127], "중랑구": [62,128], "성북구": [61,127], "강북구": [61,128], "도봉구": [61,129], "노원구": [61,129], "은평구": [59,127], "서대문구": [59,127], "마포구": [59,127], "양천구": [57,126], "강서구": [58,126], "구로구": [58,125], "금천구": [59,124], "영등포구": [58,126], "동작구": [59,125], "관악구": [59,125], "서초구": [61,125], "강남구": [61,126], "송파구": [62,126], "강동구": [62,126] },
        "부산광역시": { "중구": [96,74], "서구": [96,74], "동구": [96,75], "영도구": [96,74], "부산진구": [97,75], "동래구": [98,76], "남구": [98,75], "북구": [96,76], "해운대구": [99,75], "사하구": [96,73], "금정구": [98,77], "강서구": [96,76], "연제구": [98,76], "수영구": [98,75], "사상구": [96,75], "기장군": [100,77] },
        "대구광역시": { "중구": [89,90], "동구": [90,91], "서구": [88,90], "남구": [89,90], "북구": [89,91], "수성구": [89,90], "달서구": [88,90], "달성군": [86,88], "군위군": [88,99] },
        "인천광역시": { "중구": [54,125], "동구": [54,125], "미추홀구": [54,124], "연수구": [55,123], "남동구": [56,124], "부평구": [55,125], "계양구": [56,126], "서구": [54,126], "강화군": [51,130], "옹진군": [54,124] },
        "광주광역시": { "동구": [58,74], "서구": [57,74], "남구": [58,73], "북구": [59,74], "광산구": [57,74] },
        "대전광역시": { "동구": [68,100], "중구": [68,100], "서구": [67,100], "유성구": [67,100], "대덕구": [68,100] },
        "울산광역시": { "중구": [102,84], "남구": [102,84], "동구": [103,84], "북구": [103,85], "울주군": [101,84] },
        "세종특별자치시": { "세종시": [66,103] },
        "경기도": { "수원시": [60,121], "성남시": [62,123], "용인시": [64,121], "고양시": [57,128], "안산시": [58,121], "남양주시": [62,128], "화성시": [57,119] },
        "강원특별자치도": { "춘천시": [73,134], "원주시": [76,122], "강릉시": [92,131], "속초시": [87,141], "동해시": [97,127] },
        "충청북도": { "청주시": [69,107], "충주시": [76,114], "제천시": [81,118], "음성군": [72,113] },
        "충청남도": { "천안시": [63,110], "아산시": [60,110], "서산시": [51,110], "당진시": [54,112], "공주시": [63,102] },
        "전북특별자치도": { "전주시": [63,89], "군산시": [56,92], "익산시": [60,91], "정읍시": [58,83], "남원시": [68,80], "김제시": [59,88], "완주군": [63,89], "진안군": [68,88], "무주군": [72,93], "장수군": [70,85], "임실군": [66,84], "순창군": [63,79], "고창군": [56,80], "부안군": [56,87] },
        "전라남도": { "목포시": [50,67], "여수시": [73,66], "순천시": [70,70], "나주시": [56,71], "광양시": [73,70] },
        "경상북도": { "포항시": [102,94], "경주시": [100,91], "안동시": [91,106], "구미시": [84,96], "경산시": [91,90], "독도": [144,123] },
        "경상남도": { "창원시": [90,77], "김해시": [95,77], "진주시": [81,75], "양산시": [97,79], "거제시": [90,69], "통영시": [87,68] },
        "제주특별자치도": { "제주시": [52,38], "서귀포시": [52,33] }
    };

    // 1. 지역 선택 로직
    function initRegion() {
        const mainSel = document.getElementById('main-region');
        for (let region in regionData) {
            let opt = document.createElement('option');
            opt.value = region; opt.innerHTML = region;
            mainSel.appendChild(opt);
        }
    }

    function updateSubRegion() {
        const mainRegion = document.getElementById('main-region').value;
        const subSel = document.getElementById('sub-region');
        subSel.innerHTML = '<option value="">시/군/구 선택</option>';
        if (mainRegion && regionData[mainRegion]) {
            for (let sub in regionData[mainRegion]) {
                let opt = document.createElement('option');
                opt.value = sub; opt.innerHTML = sub;
                subSel.appendChild(opt);
            }
        }
    }

    // 2. 시계 로직
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('ko-KR', { hour12: false });
        document.getElementById('date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    // 3. 날씨 페치 로직
    async function fetchWeather() {
        const mainRegion = document.getElementById('main-region').value;
        const subRegion = document.getElementById('sub-region').value;
        if (!mainRegion || !subRegion) { alert("지역을 선택해 주세요!"); return; }

        const [nx, ny] = regionData[mainRegion][subRegion];
        const weatherDiv = document.getElementById('weather-content');
        weatherDiv.innerHTML = '<div style="text-align:center; padding-top:60px;">로딩 중...</div>';

        let now = new Date();
        let searchTime = new Date(now.getTime() - (60 * 60 * 1000));
        const baseDate = searchTime.getFullYear() + (searchTime.getMonth() + 1).toString().padStart(2, '0') + searchTime.getDate().toString().padStart(2, '0');
        const baseTime = searchTime.getHours().toString().padStart(2, '0') + "00";

        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst?serviceKey=${serviceKey}&pageNo=1&numOfRows=100&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${nx}&ny=${ny}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.response.header.resultCode === '00') {
                const items = data.response.body.items.item;
                let info = {};
                items.forEach(item => { info[item.category] = item.obsrValue; });
                const temp = parseFloat(info['T1H']);
                const ptyDict = {"0": "맑음☀️", "1": "비☔", "2": "비/눈🌨️", "3": "눈❄️", "5": "빗방울💧"};
                let recommend = temp <= 5 ? "🧥 매우 춥습니다! 두꺼운 패딩 추천" : temp <= 12 ? "🧥 쌀쌀해요. 코트나 경량패딩" : "👕 가벼운 자켓이 적당해요";

                weatherDiv.innerHTML = `
                    <div style="text-align:center; font-weight:bold; color:#3498db;">📍 ${mainRegion} ${subRegion}</div>
                    <div class="temp-main">${temp}°C</div>
                    <div style="text-align:center; margin-bottom:10px; font-weight:bold; color:#7f8c8d;">${ptyDict[info['PTY']] || '맑음'}</div>
                    <div style="font-size:0.9rem; color:#34495e; display:flex; justify-content:space-around;">
                        <span>💧 습도: ${info['REH']}%</span>
                        <span>💨 풍속: ${info['WSD']}m/s</span>
                    </div>
                    <div class="recommend">${recommend}</div>
                `;
                document.getElementById('last-update').innerText = `최근 업데이트: ${now.toLocaleTimeString()}`;
            }
        } catch (e) { weatherDiv.innerHTML = '<div style="text-align:center; padding-top:50px; color:red;">날씨 정보를 불러오지 못했습니다.</div>'; }
    }

    // 🎵 4. 음악 플레이어 로직
    const musicFileInput = document.getElementById('music-file');
    const audioPlayer = document.getElementById('audio-player');
    const songNameDisplay = document.getElementById('song-name');

    musicFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            songNameDisplay.innerText = "🎵 " + file.name;
            const fileURL = URL.createObjectURL(file);
            audioPlayer.src = fileURL;
            audioPlayer.play();
        }
    });

    initRegion();
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
