    // 2. 지도 초기화
    const map = L.map('map', {
        center: [36.2, 127.8], 
        zoom: 7
    });

    L.tileLayer('https://tiles.osm.kr/hot/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 3. 실시간 초단기 날씨 요청 함수
    async function fetchWeather(nx, ny) {
        const now = new Date();
        // 기상청 데이터는 매시각 40분 이후에 안정적으로 생성됨
        if (now.getMinutes() < 40) {
            now.setHours(now.getHours() - 1);
        }
        const base_date = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        const base_time = String(now.getHours()).padStart(2, '0') + "00";

        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst?serviceKey=${WEATHER_API_KEY}&numOfRows=10&pageNo=1&dataType=JSON&base_date=${base_date}&base_time=${base_time}&nx=${nx}&ny=${ny}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            // 요청하신 데이터 구조 검증 로직 적용
            if (data.response.header.resultCode === '00') {
                const items = data.response.body.items.item;
                const info = {};
                items.forEach(item => { 
                    info[item.category] = item.obsrValue; 
                });
                return info;
            }
            return null;
        } catch (error) {
            console.error('API 호출 실패:', error);
            return null;
        }
    }

    // 4. 마커 생성 및 클릭 이벤트
    regions.forEach(region => {
        const marker = L.circleMarker([region.lat, region.lon], {
            radius: 6,
            fillColor: "#e74c3c",
            color: "#fff",
            weight: 1.5,
            fillOpacity: 0.9
        }).addTo(map);

        marker.bindTooltip(region.name);

        marker.on('click', async function (e) {
            const popup = L.popup({ minWidth: 200 })
                .setLatLng(e.latlng)
                .setContent('<div class="loading">실시간 날씨 로딩 중...</div>')
                .openOn(map);

            const info = await fetchWeather(region.nx, region.ny);
            
            if (info) {
                // 기온 처리 및 의상 추천 로직
                const temp = parseFloat(info['T1H']);
                const recommend = temp <= 5 ? "🧥 매우 춥습니다! 두꺼운 패딩 추천" : 
                                  temp <= 12 ? "🧥 쌀쌀해요. 코트나 경량패딩" : 
                                  "👕 가벼운 자켓이 적당해요";

                // 날씨 상태 딕셔너리 적용
                const ptyDict = {"0": "맑음☀️", "1": "비☔", "2": "비/눈🌨️", "3": "눈❄️", "5": "빗방울💧"};
                const weatherStatus = ptyDict[info['PTY']] || "정보없음";

                const html = `
                    <div class="weather-popup">
                        <div class="popup-header">
                            <span>📍 ${region.name}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">현재날씨</span>
                            <span class="info-value">${weatherStatus}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">기온</span>
                            <span class="info-value">${temp}°C</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">습도</span>
                            <span class="info-value">${info['REH']}%</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">풍속</span>
                            <span class="info-value">${info['WSD']} m/s</span>
                        </div>
                        <div class="recommend-box">
                            <strong>의상 추천:</strong><br>${recommend}
                        </div>
                    </div>`;
                popup.setContent(html);
            } else {
                popup.setContent('<div class="loading">날씨 데이터를 불러올 수 없습니다.</div>');
            }
        });
    });
