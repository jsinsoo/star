<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>micro:bit Radio Remote Simulator</title>

<style>

body{
    font-family: Arial;
    background:#f0f3f7;
    text-align:center;
}

.container{
    width:520px;
    margin:auto;
}

.box{
    border:1px solid #ccc;
    border-radius:10px;
    padding:15px;
    margin:10px;
    background:white;
}

button{
    padding:10px 18px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}

#led{
    width:150px;
    margin:auto;
    padding:10px;
    background:gray;
    color:white;
    border-radius:8px;
}

textarea{
    width:100%;
    height:120px;
}

</style>

</head>

<body>

<div class="container">

<h2>micro:bit Radio Remote Control</h2>

<div class="box">
<h3>리모컨 micro:bit</h3>

<button onclick="sendA()">A 버튼</button>
<button onclick="sendB()">B 버튼</button>

</div>

<div class="box">
<h3>전등 micro:bit</h3>

<div id="led">LED OFF</div>

<p id="brightness">밝기 : 수동</p>

<input type="range" id="light" min="0" max="255" value="100"
oninput="updateBrightness()">

</div>

<div class="box">
<h3>라디오 로그</h3>
<textarea id="log"></textarea>
</div>

</div>

<script>

let radio_message = ""
let led_state = 0
let light_mode = 0

function sendA(){

    radio_message = "A"
    log("송신 → A")
    receiveRadio()

}

function sendB(){

    radio_message = "B"
    log("송신 → B")
    receiveRadio()

}

function receiveRadio(){

    log("수신 ← " + radio_message)

    if(radio_message == "A"){

        light_mode = 0

        if(led_state == 0){

            led_state = 1
            setLED("LED ON","yellow")

        }else{

            led_state = 0
            setLED("LED OFF","gray")

        }

    }else{

        light_mode = 1
        led_state = 1
        setLED("조도 모드","orange")

    }

    updateBrightness()
}

function setLED(text,color){

    let led = document.getElementById("led")
    led.innerText = text
    led.style.background = color

}

function updateBrightness(){

    if(light_mode == 1){

        let light = document.getElementById("light").value
        let brightness = 255 - light

        document.getElementById("brightness").innerText =
        "밝기 : " + brightness

    }else{

        document.getElementById("brightness").innerText =
        "밝기 : 수동"

    }

}

function log(text){

    let logbox = document.getElementById("log")
    logbox.value += text + "\n"
    logbox.scrollTop = logbox.scrollHeight

}

</script>

</body>
</html>
